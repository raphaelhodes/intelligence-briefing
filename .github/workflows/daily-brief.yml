name: Raph's Daily Intelligence Brief

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agent to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - news
          - podcasts

jobs:
  news-agent:
    name: News Intelligence Agent
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.agent == 'both' || github.event.inputs.agent == 'news' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run news agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_NEWS_DB_ID: ${{ secrets.NOTION_NEWS_DB_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python agents/news_agent.py

  podcast-agent:
    name: Podcast Intelligence Agent
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.agent == 'both' || github.event.inputs.agent == 'podcasts' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run podcast agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PODCAST_DB_ID: ${{ secrets.NOTION_PODCAST_DB_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python agents/podcast_agent.py
